name: Build and deploy Node.js app to Azure Web App - brandstock-app

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: npm install
        run: npm install
        working-directory: ./backend

      - name: Build TypeScript
        run: npm run build
        working-directory: ./backend

      - name: Zip artifact for deployment
        run: |
          sudo apt-get update && sudo apt-get install -y zip
          zip -r release.zip dist/ package.json package-lock.json .env* 2>/dev/null || true
          ls -la release.zip
        working-directory: ./backend

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: backend/release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_433AA0A1A3AF431B99623F43E74E8EBD }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_136544EEB7EB4A239F52104FC83CFC05 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_9573ED8AF17C45908BE097862938FEE1 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'brandstock-app'
          slot-name: 'Production'
          package: release.zip
